[project]
name = "agate-utils"
version = "0.1.0"
description = "Shared utilities for Agate AI Platform"
requires-python = ">=3.11"
dependencies = [
    "openai>=1.12.0",
    "cryptography>=41.0.0",
    "ddgs>=9.0.0",
    "geopy>=1.32.0",
    "h3>=4.3.1",
    "overpy>=0.7",
    "requests>=2.28.0",
    "shapely>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agate_utils"]
