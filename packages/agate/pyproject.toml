[project]
name = "agate-core"
version = "0.1.0"
description = "Core SDK, node implementations, and database models for Agate AI Platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "sqlmodel>=0.0.14",
    "psycopg[binary]>=3.1.0",
    "agate-utils",
    "boto3>=1.34.0",
    "langgraph>=0.2.0",
    "requests>=2.31.0",
    "redis>=5.0.0",
    "celery>=5.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agate_core", "src/agate_nodes", "src/agate_db"]

[tool.uv.sources]
agate-utils = { path = "../utils", editable = true }
